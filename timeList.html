<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>当日预约时间表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            padding: 40px;
            background: #f5f7fa;
        }
        .container {
            width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #222;
        }
        .time-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #eee;
        }
        /* 绿色：可预约 */
        .free {
            background: #e6ffea;
        }
        /* 红色：已预约 */
        .used {
            background: #ffe9e9;
        }
        .time-text {
            font-size: 15px;
        }
        .tag-free {
            color: #009a24;
            margin-left: 10px;
        }
        .tag-used {
            color: #e53e3e;
            margin-left: 10px;
        }
        .order-btn {
            padding: 5px 14px;
            border: none;
            border-radius: 4px;
            background: #2378e8;
            color: white;
            cursor: default;
        }
        .back-btn {
            margin-top: 30px;
            padding: 8px 20px;
            border: none;
            background: #666;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="pageTitle">加载信息</h2>
        <div id="listWrap"></div>
        <button class="back-btn" onclick="history.back()">返回日历页面</button>
    </div>
<script>
const urlParams = new URLSearchParams(window.location.search);
const code = urlParams.get("code");
const name = urlParams.get("name");
const day = urlParams.get("day");
document.getElementById("pageTitle").innerText = `打手【${name}】${day}号 全部时段`;
// 模拟时段数据：isFree true=绿色可预约 false=红色已预约
const timeData = [
    {time:"08:00 - 10:00", isFree:true},
    {time:"10:00 - 12:00", isFree:false},
    {time:"12:00 - 14:00", isFree:true},
    {time:"14:00 - 16:00", isFree:false},
    {time:"16:00 - 18:00", isFree:true},
    {time:"18:00 - 20:00", isFree:true},
    {time:"20:00 - 22:00", isFree:false},
];
const wrap = document.getElementById("listWrap");
timeData.forEach(item=>{
    const row = document.createElement("div");
    row.className = `time-row ${item.isFree ? "free" : "used"}`;
    row.innerHTML = `
        <div class="time-text">
            ${item.time}
            <span class="${item.isFree ? "tag-free" : "tag-used"}">
                ${item.isFree ? "【可预约】" : "【已预约】"}
            </span>
        </div>
        <button class="order-btn">预约</button>
    `;
    wrap.appendChild(row);
})
</script>
</body>
</html>
